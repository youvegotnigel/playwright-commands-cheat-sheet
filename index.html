<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎭 Playwright Commands Dashboard </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>🎭 Playwright Commands Dashboard 🎭</header>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search commands, descriptions, tips..." aria-label="Search commands">
    <span class="search-shortcut" id="search-shortcut"></span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="toolbar">
    <button class="view-btn active" id="btnFlat">Flat</button>
    <button class="view-btn"        id="btnGrouped">Grouped</button>
  </div>
  <div id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-icon" id="btn-close-icon">×</span>
    <div class="modal-header">
      <h3 class="modal-title" id="m-title"></h3>
      <span class="level-badge" id="m-level"></span>
    </div>
    <p   class="modal-desc" id="m-desc"></p>
    <pre                    id="m-code"></pre>
    <div class="modal-tip"  id="m-tip"></div>
    <div class="modal-footer">
      <button class="btn-copy"  id="btn-copy">Copy</button>
      <a      class="btn-docs"  id="btn-docs" href="#" target="_blank">Docs ↗</a>
      <button class="btn-close" id="btn-close">Close</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
