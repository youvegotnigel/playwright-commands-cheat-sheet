<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Smart Cheat Sheet</title>
<style>
body {font-family: Arial; margin:0; background:#0f172a; color:#e2e8f0;}
header {padding:16px; text-align:center; font-size:22px; background:#020617;}
.container {padding:15px; max-width:1200px; margin:auto;}
input {width:100%; padding:10px; margin-bottom:15px; border-radius:6px; border:none;}

.grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
.tile {
  border-radius:12px;
  padding:14px 10px;
  min-height:70px;
  text-align:center;
  cursor:pointer;
  font-weight:500;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: transform 0.2s;
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}
.tile:hover {transform: scale(1.05);} 

.query{background:linear-gradient(135deg,#3b82f6,#1d4ed8);} 
.action{background:linear-gradient(135deg,#22c55e,#16a34a);} 
.assertion{background:linear-gradient(135deg,#fb923c,#ea580c);}  
.utility{background:linear-gradient(135deg,#a855f7,#7e22ce);}  
.api{background:linear-gradient(135deg,#ef4444,#dc2626);} 

.modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none; align-items:center; justify-content:center;
}
.modal-content {
  position:relative;
  background:#1e293b; padding:20px; border-radius:10px; max-width:600px; width:90%;
}
pre {
  background:#020617;
  padding:10px;
  border-radius:6px;
  overflow:auto;
  white-space: pre-wrap;
  word-break: break-word;
}
button {margin-top:10px; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; background:#38bdf8; color:black;}

.close-icon {
  position:absolute;
  top:10px;
  right:14px;
  font-size:20px;
  cursor:pointer;
  color:#94a3b8;
}
.close-icon:hover {
  color:#ffffff;
}

.legend {display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px; justify-content:center;}
.legend-item {display:flex; align-items:center; gap:8px; font-size:14px; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,0.06); box-shadow:0 4px 10px rgba(0,0,0,0.25); backdrop-filter: blur(6px);}
.box {width:14px; height:14px; border-radius:4px; display:inline-block;}

</style>
</head>
<body>
<header>🚀 QA Smart Cheat Sheet</header>
<div class="container">
<input placeholder="Search commands..." oninput="search(this.value)">

<div class="legend">
  <div class="legend-item"><span class="box query"></span> Queries</div>
  <div class="legend-item"><span class="box action"></span> Actions</div>
  <div class="legend-item"><span class="box assertion"></span> Assertions</div>
  <div class="legend-item"><span class="box utility"></span> Utilities</div>
  <div class="legend-item"><span class="box api"></span> APIs</div>
</div>
<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-icon" onclick="closeModal()">×</span>
    <h3 id="title"></h3>
    <pre id="code"></pre>
    <button onclick="copyCode()">Copy</button>
    <button id="closeBtn" style="display:none;background:#22c55e;color:black;" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const data = [
{cat:'Query',cls:'query',items:[
{name:'locator()',code:`const btn = page.locator('#login');
await btn.click();`},
{name:'getByRole()',code:`await page.getByRole('button',{name:'Submit'}).click();`},
{name:'getByText()',code:`await page.getByText('Welcome').click();`},
{name:'getByLabel()',code:`await page.getByLabel('Email').fill('test@mail.com');`},
{name:'getByPlaceholder()',code:`await page.getByPlaceholder('Search...').fill('Playwright');`},
{name:'frameLocator()',code:`await page.frameLocator('#frame').locator('button').click();`},
{name:'nth()',code:`await page.locator('li').nth(2).click();`}
]},
{cat:'Action',cls:'action',items:[
{name:'click()',code:`await page.locator('#login').click();`},
{name:'fill()',code:`await page.locator('#email').fill('test@mail.com');`},
{name:'press()',code:`await page.locator('#input').press('Enter');`},
{name:'check()',code:`await page.locator('#checkbox').check();`},
{name:'uncheck()',code:`await page.locator('#checkbox').uncheck();`},
{name:'hover()',code:`await page.locator('#menu').hover();`},
{name:'dragTo()',code:`await page.locator('#drag').dragTo(page.locator('#drop'));`},
{name:'setInputFiles()',code:`await page.locator('input[type=file]').setInputFiles('file.pdf');`}
]},
{cat:'Assertions',cls:'assertion',items:[
{name:'toBeVisible()',code:`await expect(page.locator('#msg')).toBeVisible();`},
{name:'toHaveText()',code:`await expect(page.locator('h1')).toHaveText('Dashboard');`},
{name:'toHaveURL()',code:`await expect(page).toHaveURL(/dashboard/);`},
{name:'toHaveCount()',code:`await expect(page.locator('li')).toHaveCount(5);`},
{name:'toBeEnabled()',code:`await expect(page.locator('#btn')).toBeEnabled();`},
{name:'toBeChecked()',code:`await expect(page.locator('#checkbox')).toBeChecked();`}
]},
{cat:'Utility',cls:'utility',items:[
{name:'waitForSelector()',code:`await page.waitForSelector('#login');`},
{name:'waitForTimeout()',code:`await page.waitForTimeout(2000);`},
{name:'screenshot()',code:`await page.screenshot({path:'shot.png'});`},
{name:'pause()',code:`await page.pause();`},
{name:'evaluate()',code:`await page.evaluate(() => document.title);`},
{name:'on(console)',code:`page.on('console', msg => console.log(msg.text()));`}
]},
{cat:'API',cls:'api',items:[
{name:'request.get()',code:`const res = await request.get('/api/users');`},
{name:'request.post()',code:`await request.post('/api/login', {
  data: {
    user: 'test'
  }
});`},
{name:'route()',code:`await page.route('**/api', route => {
  route.fulfill({
    status: 200,
    body: 'mock'
  });
});`},
{name:'waitForResponse()',code:`await page.waitForResponse(res => res.url().includes('/api'));`}
]}
];

let allItems=[];
data.forEach(sec=>sec.items.forEach(i=>allItems.push({...i,cls:sec.cls})));

function render(items=allItems){
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  items.forEach((item,index)=>{
    const div=document.createElement('div');
    div.className=`tile ${item.cls}`;

    div.innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <span style="font-size:12px;opacity:0.7;">#${index+1}</span>
        <span>${item.name}</span>
      </div>
    `;

    div.onclick=()=>openModal(item);
    grid.appendChild(div);
  });
}

function openModal(item){
document.getElementById('modal').style.display='flex';
document.getElementById('title').innerText=item.name;
document.getElementById('code').innerText=item.code;
}

function closeModal(){document.getElementById('modal').style.display='none';}

function copyCode(){
  const text=document.getElementById('code').innerText;
  navigator.clipboard.writeText(text);

  const closeBtn = document.getElementById('closeBtn');
  closeBtn.style.display = 'inline-block';
}

function search(val){
val=val.toLowerCase();
const filtered=allItems.filter(i=>i.name.toLowerCase().includes(val) || i.code.toLowerCase().includes(val));
render(filtered);
}

render();
</script>
</body>
</html>
