<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎭 Playwright Cheat Sheet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>🎭 VitalHub Playwright Cheat Sheet</header>

<div class="container">
  <input type="text" placeholder="Search commands, descriptions, tips..." oninput="search(this.value)">
  <div class="filters" id="filters"></div>
  <div class="toolbar">
    <button class="view-btn active" id="btnFlat"    onclick="setView('flat')">Flat</button>
    <button class="view-btn"        id="btnGrouped" onclick="setView('grouped')">Grouped</button>
  </div>
  <div id="grid"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-icon" onclick="closeModal()">×</span>
    <div class="modal-header">
      <h3 class="modal-title" id="m-title"></h3>
      <span class="level-badge" id="m-level"></span>
    </div>
    <p   class="modal-desc" id="m-desc"></p>
    <pre                    id="m-code"></pre>
    <div class="modal-tip"  id="m-tip"></div>
    <div class="modal-footer">
      <button class="btn-copy" id="btn-copy" onclick="copyCode()">Copy</button>
      <a      class="btn-docs" id="btn-docs" href="#" target="_blank">Docs ↗</a>
      <button class="btn-close"              onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- data.js must load before app.js (app.js reads the categories array) -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
